name: CI

on:
  pull_request:

# 同一 PR への連続 push では古い実行をキャンセルし、高価な macOS ランナーを節約する。
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_26.app || true

      - name: Install tools
        run: brew install xcodegen swiftlint

      - name: Run CI (lint + build + test)
        run: make ci
